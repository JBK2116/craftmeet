<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
        <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
        <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="text-scale" content="scale" />
        <meta name="description" content="Craftmeet is a real-time meeting platform for hosting structured, idea-driven sessions with flexible question formats, live collaboration, and AI-generated summaries." />
        <!-- Ensure the proper theme is loaded before the page-->
        <script>
            const t = localStorage.getItem('theme');
            if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
        </script>
        <title>Craftmeet</title>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <noscript>
            <div style="max-width:640px;margin:80px auto;padding:0 24px;font-family:system-ui,sans-serif;color:#1a1a1a;line-height:1.6">
                <h1 style="font-size:2rem;font-weight:700;margin-bottom:0.5rem">Craftmeet</h1>
                <p style="font-size:1.125rem;color:#555;margin-bottom:1.5rem">
                    Craftmeet is a real-time meeting platform that helps you host structured, idea-driven sessions.
                    Build meetings with flexible question formats — multiple choice, long answer, ranked voting, rating scales, and yes/no polls.
                    Launch them live with your group, watch responses stream in, and receive an AI-generated PDF summary the moment your meeting ends.
                </p>
                <p style="font-size:0.875rem;color:#777;margin-bottom:1rem">
                    Craftmeet uses <strong>Sign in with Google</strong> (openid, profile, email scopes) solely for account creation and authentication.
                    Your Google account name and email are used to identify you within the app. No Google data is shared with third parties.
                </p>
                <p style="font-size:0.875rem;color:#777">
                    <a href="/privacy" style="color:#2563eb">Privacy Policy</a>
                    &nbsp;·&nbsp;
                    <a href="/terms" style="color:#2563eb">Terms of Service</a>
                    &nbsp;·&nbsp;
                    <a href="/contact" style="color:#2563eb">Contact</a>
                </p>
            </div>
        </noscript>
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
